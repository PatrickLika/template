openapi: 3.0.0
info:
  title: Customer API
  version: 1.0.0
servers:
  - description: Test server
    url: http://localhost:8080
paths:
  /customers:
    post:
      tags:
        - customer
      summary: Create a customer
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRequest'
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
    get:
      tags:
        - customer
      summary: Get all customers
      operationId: getCustomers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerResponse'

  /customers/{customerId}:
    get:
      tags:
        - customer
      summary: Get a customer by ID
      operationId: getCustomerById
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '404':
          description: Customer not found
    put:
      tags:
        - customer
      summary: Update a customer
      operationId: updateCustomer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRequest'
      responses:
        '200':
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '404':
          description: Customer not found
    delete:
      tags:
        - customer
      summary: Delete a customer
      operationId: deleteCustomer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Customer deleted
        '404':
          description: Customer not found

components:
  schemas:
    CustomerRequest:
      description: Customer input payload
      type: object
      required:
        - name
        - age
        - address
        - married
      properties:
        name:
          type: string
          description: Customer's full name
          example: John Doe
        age:
          type: integer
          description: Customer's age
          example: 34
        address:
          type: string
          description: Customer's address
          example: 123 Main Street, Copenhagen
        married:
          type: boolean
          description: Customer's marital status
          example: false

    CustomerResponse:
      description: Customer response with ID
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Unique customer ID
          example: 1
        name:
          type: string
          description: Customer's full name
        age:
          type: integer
          description: Customer's age
        address:
          type: string
          description: Customer's address
        married:
          type: boolean
          description: Customer's marital status